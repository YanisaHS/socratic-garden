<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Socratic Garden logo">
  <title>Socratic Garden</title>
  <!-- Card background -->
  <rect x="4" y="4" width="192" height="192" rx="40" fill="#0f3d2e"/>
  <rect x="4" y="4" width="192" height="192" rx="40" fill="url(#bg)" fill-opacity="0.35"/>

  <!-- Document / page the idea grows from -->
  <g>
    <rect x="62" y="96" width="76" height="70" rx="8" fill="#f4f1e9"/>
    <rect x="74" y="112" width="52" height="6" rx="3" fill="#c9cfc2"/>
    <rect x="74" y="126" width="52" height="6" rx="3" fill="#c9cfc2"/>
    <rect x="74" y="140" width="34" height="6" rx="3" fill="#c9cfc2"/>
  </g>

  <!-- Soil mound -->
  <path d="M60 104 Q100 92 140 104 Q100 114 60 104 Z" fill="#6b4a2b"/>

  <!-- Sprout stem -->
  <path d="M100 108 C100 96 100 80 100 66" stroke="#7bd389" stroke-width="7" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M100 92 C82 92 70 80 70 62 C90 62 100 74 100 92 Z" fill="#57c07a"/>
  <!-- Right leaf shaped as a question mark head (Socratic questioning) -->
  <path d="M100 80 C118 80 132 68 132 50 C112 50 100 62 100 80 Z" fill="#8ee6a3"/>

  <!-- Pink flower at the sprout tip -->
  <g>
    <g fill="#f7a8c4">
      <ellipse cx="100" cy="30" rx="9" ry="13"/>
      <ellipse cx="100" cy="58" rx="9" ry="13"/>
      <ellipse cx="86" cy="44" rx="13" ry="9"/>
      <ellipse cx="114" cy="44" rx="13" ry="9"/>
      <ellipse cx="89" cy="33" rx="11" ry="9" transform="rotate(-45 89 33)"/>
      <ellipse cx="111" cy="33" rx="11" ry="9" transform="rotate(45 111 33)"/>
      <ellipse cx="89" cy="55" rx="11" ry="9" transform="rotate(45 89 55)"/>
      <ellipse cx="111" cy="55" rx="11" ry="9" transform="rotate(-45 111 55)"/>
    </g>
    <circle cx="100" cy="44" r="8" fill="#f4d06f"/>
    <circle cx="100" cy="44" r="4" fill="#e8a33d"/>
  </g>

  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="196" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1f6b4f"/>
      <stop offset="1" stop-color="#0c2c21"/>
    </linearGradient>
  </defs>
</svg>
